on can be gifted, up to the daily limit."]},{title:"Terms & Conditions",points:["<strong>Right to Modify or Cancel:</strong> noon reserves the right to modify, suspend, or terminate the campaign, its mechanics, or its rewards at any time without prior notice.","<strong>Fraud & Abuse:</strong> Any attempt to manipulate the system, create fake accounts, or engage in fraudulent activity to acquire stamps or rewards will result in immediate disqualification and revocation of all earned assets.","<strong>Reward Fulfillment:</strong> Rewards (such as cashback or the Mega Reward) are subject to availability and may be substituted at the platform's discretion. Rewards are non-transferable and cannot be exchanged for cash.","<strong>Final Decision:</strong> All decisions made by noon regarding stamp distribution, dispute resolution, and reward allocation are final and binding.","<strong>Criteria for rewards:</strong> User needs to have a unique local verified phone number in order to be eligible to claim the rewards."]}],ar:[{title:"كيفية اللعب",points:["<strong>الهدف:</strong> اجمع جميع الطوابع الرمضانية الخمسة الفريدة لفتح المكافآت","<strong>كيفية الكسب:</strong> اجمع الطوابع يومياً من خلال إتمام المهام المذكورة في قسم كيفية كسب الطوابع على التطبيق. سيتم مكافأتك بطابع عشوائي في كل مرة تكمل فيها مهمة مؤهلة","<strong>إهداء الطوابع:</strong> يمكنك الحصول على طوابع جديدة من خلال إهداء الطوابع الإضافية في مجموعتك لأصدقائك","<strong>طلب الطوابع:</strong> إذا كنت تفتقد طابعاً معيناً، يمكنك طلبه من صديق","<strong>المكافآت:</strong> اكسب جوائز استرداد نقدي عند جمع 25 و50 طابعاً، وافتح المكافأة الكبرى عند جمع جميع الطوابع الخمسة الفريدة"]},{title:"قواعد الإهداء والطلب",points:["ستكسب طابعاً جديداً فقط بعد أن يتم قبول هديتك، وسيتم إعلامك بذلك عبر الإشعارات","يمكنك فقط إهداء الطوابع التي لديك أكثر من نسخة منها","لا يمكن إهداء الطوابع المتعلقة بالطلبات","يمكن للصديق قبول هدية واحدة فقط يومياً من نفس المستخدم لتجنب إساءة الاستخدام"]},{title:"معلومات المكافآت",points:["اجمع أي 25 طابعاً
